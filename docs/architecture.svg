<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Real-Time Multilingual Voice AI Agent — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#6B7280">Clinical Appointment Booking · Target latency: &lt;450ms end-to-end</text>

  <!-- === TELEPHONY LAYER === -->
  <rect x="30" y="80" width="840" height="70" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Telephony Layer — Twilio</text>
  <text x="225" y="128" text-anchor="middle" font-size="12" fill="#1D4ED8">Inbound: WebSocket media stream (mulaw 8kHz)</text>
  <text x="675" y="128" text-anchor="middle" font-size="12" fill="#1D4ED8">Outbound: REST API dial + AMD detection</text>
  <line x1="450" y1="88" x2="450" y2="148" stroke="#93C5FD" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Down arrow from telephony -->
  <line x1="280" y1="150" x2="280" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="150" x2="450" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="150" x2="620" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === STT ROW === -->
  <!-- STT -->
  <rect x="60" y="178" width="200" height="62" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="160" y="201" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">STT — Deepgram</text>
  <text x="160" y="219" text-anchor="middle" font-size="11" fill="#6D28D9">nova-2 · streaming · multi-lang</text>
  <text x="160" y="233" text-anchor="middle" font-size="11" fill="#6D28D9">endpointing: 300ms · ~80ms latency</text>

  <!-- Language detect -->
  <rect x="280" y="178" width="200" height="62" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="380" y="201" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Language Detect</text>
  <text x="380" y="219" text-anchor="middle" font-size="11" fill="#6D28D9">Unicode script ranges · ~5ms</text>
  <text x="380" y="233" text-anchor="middle" font-size="11" fill="#6D28D9">EN / HI / TA per utterance</text>

  <!-- VAD / Barge-in -->
  <rect x="500" y="178" width="200" height="62" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="201" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">VAD + Barge-in</text>
  <text x="600" y="219" text-anchor="middle" font-size="11" fill="#6D28D9">Deepgram endpointing</text>
  <text x="600" y="233" text-anchor="middle" font-size="11" fill="#6D28D9">AbortController interrupt</text>

  <!-- Arrows to orchestrator -->
  <line x1="160" y1="240" x2="380" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="240" x2="400" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="240" x2="430" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === AGENT ORCHESTRATOR === -->
  <rect x="230" y="278" width="440" height="72" rx="10" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="450" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">Agent Orchestrator</text>
  <text x="450" y="320" text-anchor="middle" font-size="11" fill="#047857">Claude claude-sonnet-4-5 · streaming · tool-calling · agentic loop</text>
  <text x="450" y="337" text-anchor="middle" font-size="11" fill="#047857">Max 400 tokens · multilingual system prompt · ~150ms first token</text>

  <!-- Down arrow to TTS -->
  <line x1="450" y1="350" x2="450" y2="378" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === TTS === -->
  <rect x="280" y="378" width="340" height="62" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="450" y="401" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">TTS — ElevenLabs</text>
  <text x="450" y="419" text-anchor="middle" font-size="11" fill="#B45309">eleven_turbo_v2 · sentence-boundary flush</text>
  <text x="450" y="433" text-anchor="middle" font-size="11" fill="#B45309">ulaw_8000 output · ~100ms first chunk · EN/HI/TA voices</text>

  <!-- Arrow back to Twilio (right side loop) -->
  <path d="M620 409 L780 409 L780 115 L870 115" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5 3"/>
  <text x="812" y="265" text-anchor="middle" font-size="11" fill="#2563EB" transform="rotate(-90, 812, 265)">audio back</text>

  <!-- === BOTTOM PANELS === -->

  <!-- Scheduling Tools -->
  <rect x="30" y="470" width="210" height="130" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="135" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#78350F">Scheduling Tools</text>
  <text x="135" y="511" text-anchor="middle" font-size="11" fill="#92400E">check_available_slots()</text>
  <text x="135" y="526" text-anchor="middle" font-size="11" fill="#92400E">book_appointment()</text>
  <text x="135" y="541" text-anchor="middle" font-size="11" fill="#92400E">reschedule / cancel()</text>
  <text x="135" y="556" text-anchor="middle" font-size="11" fill="#92400E">find_alternatives()</text>
  <text x="135" y="575" text-anchor="middle" font-size="10" fill="#B45309">→ PostgreSQL (transactional)</text>
  <text x="135" y="591" text-anchor="middle" font-size="10" fill="#B45309">Conflict + double-book guard</text>

  <!-- Memory -->
  <rect x="260" y="470" width="220" height="130" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="370" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#881337">Memory</text>
  <text x="370" y="511" text-anchor="middle" font-size="11" fill="#9F1239">Session — Redis · TTL 2h</text>
  <text x="370" y="526" text-anchor="middle" font-size="11" fill="#9F1239">in-call state, lang, history</text>
  <text x="370" y="546" text-anchor="middle" font-size="11" fill="#9F1239">Long-term — PostgreSQL</text>
  <text x="370" y="561" text-anchor="middle" font-size="11" fill="#9F1239">pgvector semantic search</text>
  <text x="370" y="576" text-anchor="middle" font-size="11" fill="#9F1239">interaction summaries</text>
  <text x="370" y="591" text-anchor="middle" font-size="10" fill="#BE123C">auto-summarized by Haiku</text>

  <!-- Outbound Campaigns -->
  <rect x="500" y="470" width="220" height="130" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="610" y="494" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A8A">Outbound Campaigns</text>
  <text x="610" y="511" text-anchor="middle" font-size="11" fill="#1E40AF">BullMQ job queue (Redis)</text>
  <text x="610" y="526" text-anchor="middle" font-size="11" fill="#1E40AF">3 retries · exp. backoff</text>
  <text x="610" y="541" text-anchor="middle" font-size="11" fill="#1E40AF">Reminders · Follow-ups</text>
  <text x="610" y="556" text-anchor="middle" font-size="11" fill="#1E40AF">Twilio AMD (voicemail skip)</text>
  <text x="610" y="575" text-anchor="middle" font-size="10" fill="#1D4ED8">Same voice pipeline as inbound</text>
  <text x="610" y="591" text-anchor="middle" font-size="10" fill="#1D4ED8">Outcome → CampaignLog</text>

  <!-- Horizontal scalability note -->
  <rect x="738" y="470" width="132" height="130" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="804" y="494" text-anchor="middle" font-size="12" font-weight="700" fill="#14532D">Scale</text>
  <text x="804" y="513" text-anchor="middle" font-size="10" fill="#166534">Stateless Node.js</text>
  <text x="804" y="528" text-anchor="middle" font-size="10" fill="#166534">N workers behind LB</text>
  <text x="804" y="543" text-anchor="middle" font-size="10" fill="#166534">Redis shared state</text>
  <text x="804" y="558" text-anchor="middle" font-size="10" fill="#166534">BullMQ horizontal</text>
  <text x="804" y="578" text-anchor="middle" font-size="10" fill="#166534">DB connection pool</text>
  <text x="804" y="593" text-anchor="middle" font-size="10" fill="#166534">pgBouncer ready</text>

  <!-- Arrows from orchestrator to panels -->
  <path d="M300 350 L135 470" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <path d="M390 350 L370 470" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <path d="M560 350 L610 470" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

  <!-- Latency annotation -->
  <rect x="30" y="450" width="840" height="18" rx="4" fill="#F3F4F6"/>
  <text x="450" y="463" text-anchor="middle" font-size="11" fill="#374151">
    Latency: STT ~80ms  +  Lang detect ~5ms  +  LLM first token ~150ms  +  TTS first chunk ~100ms  +  network ~20ms  =  ~355ms total
  </text>
</svg>
